<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>No Dice — Investor Presentation</title>
    <meta name="robots" content="noindex,nofollow" />
    <script>
      // SPA fallback: GitHub Pages serves this for any path it can't find as
      // a static file (e.g. /hackney). Persist the original path and reload
      // the root — main.jsx restores it via history.replaceState before React
      // mounts, so the app sees the right pathname on first render.
      sessionStorage.setItem('ndb_redirect', location.pathname + location.search + location.hash);
      location.replace('/');
    </script>
  </head>
  <body></body>
</html>
