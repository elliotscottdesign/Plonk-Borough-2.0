<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Plonk Golf — redirecting…</title>

    <!--
      Shareable short-link. nodice.bar/plonk forwards to plonkgolf.co.uk
      so the URL is easier to share / type on a phone.
    -->

    <meta http-equiv="refresh" content="0; url=https://plonkgolf.co.uk/" />
    <link rel="canonical" href="https://plonkgolf.co.uk/" />
    <script>
      window.location.replace("https://plonkgolf.co.uk/");
    </script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0e2a21;
        color: #f2ebd9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      a {
        color: #e8c547;
      }
    </style>
  </head>
  <body>
    <div>
      <p style="font-size: 18px; margin: 0 0 12px">Redirecting you to Plonk Golf…</p>
      <p style="font-size: 14px; opacity: 0.7; margin: 0">
        If nothing happens, <a href="https://plonkgolf.co.uk/">click here</a>.
      </p>
    </div>
  </body>
</html>
