<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Plonk Golf — redirecting…</title>

    <!--
      Shareable short-link for previewing the Plonk Golf rebuild.
      Visiting nodice.bar/plonk forwards to plonkgolf.co.uk with the
      preview access code attached so the gate auto-unlocks. Once we
      delete the preview gate at full launch, this file can stay (just
      strip the ?access=PLONK) or be removed entirely.
    -->

    <meta
      http-equiv="refresh"
      content="0; url=https://plonkgolf.co.uk/?access=PLONK"
    />
    <link rel="canonical" href="https://plonkgolf.co.uk/" />
    <script>
      // JS fallback for browsers that don't honor meta refresh on first paint.
      window.location.replace("https://plonkgolf.co.uk/?access=PLONK");
    </script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0e2a21;
        color: #f2ebd9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      a {
        color: #e8c547;
      }
    </style>
  </head>
  <body>
    <div>
      <p style="font-size: 18px; margin: 0 0 12px">Redirecting you to Plonk Golf…</p>
      <p style="font-size: 14px; opacity: 0.7; margin: 0">
        If nothing happens,
        <a href="https://plonkgolf.co.uk/?access=PLONK">click here</a>.
      </p>
    </div>
  </body>
</html>
