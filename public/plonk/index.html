<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Plonk Golf — preview</title>

    <!--
      nodice.bar/plonk — preview shortcut for the new Plonk Golf build.
      Visitor enters the PLONK code → we render the Cloudflare Pages
      preview in a full-screen iframe so the address bar stays on
      www.nodice.bar/plonk the whole time.

      Notes:
      - Access code is client-side only. It's a friction gate, not real
        security. To rotate it, edit ACCESS_CODE below.
      - localStorage records the unlock per device so they only type
        the code once.
      - Links inside the iframe stay inside the iframe (relative paths
        navigate within plonkgolf-website.pages.dev) — the parent URL
        stays as nodice.bar/plonk.
    -->

    <style>
      :root {
        --ink: #0e2a21;
        --cream: #f2ebd9;
        --gold: #e8c547;
        --red: #f3a6b0;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--ink);
        color: var(--cream);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
      }
      #gate {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        box-sizing: border-box;
      }
      .card {
        width: 100%;
        max-width: 420px;
        text-align: center;
      }
      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 400;
        font-size: 40px;
        line-height: 1.1;
        margin: 0 0 12px;
      }
      p.sub {
        margin: 0 0 28px;
        color: rgba(242, 235, 217, 0.7);
        font-size: 15px;
        line-height: 1.5;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      input {
        padding: 14px 16px;
        border-radius: 10px;
        border: 1px solid rgba(242, 235, 217, 0.25);
        background: rgba(0, 0, 0, 0.25);
        color: var(--cream);
        font-size: 16px;
        text-align: center;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        outline: none;
      }
      input:focus {
        border-color: var(--gold);
      }
      button {
        padding: 14px 20px;
        border-radius: 999px;
        border: none;
        background: var(--gold);
        color: var(--ink);
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.05);
      }
      p.err {
        margin: 0;
        color: var(--red);
        font-size: 13px;
        min-height: 18px;
      }
      #frame {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="gate">
      <div class="card">
        <h1>Plonk Golf</h1>
        <p class="sub">Preview only. Enter the access code to continue.</p>
        <form id="f">
          <input
            id="code"
            type="text"
            autocomplete="off"
            autocapitalize="characters"
            placeholder="Access code"
            autofocus
          />
          <p class="err" id="err"></p>
          <button type="submit">Enter</button>
        </form>
      </div>
    </div>

    <iframe
      id="frame"
      class="hidden"
      title="Plonk Golf preview"
      src="about:blank"
      allow="payment; clipboard-read; clipboard-write"
    ></iframe>

    <script>
      var ACCESS_CODE = "PLONK";
      var DESTINATION = "https://plonk.nodice.bar/";
      var STORAGE_KEY = "ndb_plonk_preview";

      var gate = document.getElementById("gate");
      var frame = document.getElementById("frame");
      var form = document.getElementById("f");
      var input = document.getElementById("code");
      var err = document.getElementById("err");

      function unlock() {
        frame.src = DESTINATION;
        frame.classList.remove("hidden");
        gate.classList.add("hidden");
      }

      // Already unlocked on this device? Skip the form.
      try {
        if (localStorage.getItem(STORAGE_KEY) === "1") {
          unlock();
        }
      } catch (e) {
        /* localStorage blocked — just show the form */
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var entered = (input.value || "").trim().toUpperCase();
        if (entered === ACCESS_CODE) {
          try {
            localStorage.setItem(STORAGE_KEY, "1");
          } catch (e2) {
            /* ignore */
          }
          unlock();
        } else {
          err.textContent = "That's not the right code.";
          input.focus();
          input.select();
        }
      });
    </script>
  </body>
</html>
