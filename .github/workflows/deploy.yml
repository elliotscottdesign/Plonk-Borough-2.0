name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      file_path:
        description: 'File path to update'
        required: false
      file_content:
        description: 'Base64 encoded file content'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Default GITHUB_TOKEN is sufficient for read-only checkout.
        # GH_PAT is only needed for the workflow_dispatch file-update path below,
        # which does its own re-checkout with the PAT when it runs.

      - name: Apply file update if dispatched
        if: github.event_name == 'workflow_dispatch' && inputs.file_path != ''
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          mkdir -p $(dirname "${{ inputs.file_path }}")
          echo "${{ inputs.file_content }}" | base64 -d > "${{ inputs.file_path }}"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add "${{ inputs.file_path }}"
          git commit -m "Update ${{ inputs.file_path }}" || echo "No changes"
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
